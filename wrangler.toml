name = "sub-store-bot"
main = "worker.mjs"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

# KV Namespace（一键部署会自动创建）
# 如果用 GitHub Actions 部署，需要先创建 KV Namespace.
# 把 ID 设为 Secret KV_ID，在 wrangler.toml 引用：
[[kv_namespaces]]
binding = "KV"
# id = "你的 KV Namespace ID"
[vars]
ALLOWED_USERS = "允许的用户 ID（逗号分隔），不设则全部开放"
BOT_TOKEN = "Telegram Bot Token"
CLIP_URL = "短链基础 URL，如 https://xxx.workers.dev"
WEBHOOK_SECRET = "域名防呆，随便设置个密码"
# PROXY_URL = "反代基础 URL，绕过 CF-to-CF 拉取拦截（可选）"
# DEBUG_TOKEN = "debug-fetch 接口鉴权 Token（可选）"
