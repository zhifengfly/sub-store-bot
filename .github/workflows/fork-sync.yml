name: Fork Sync

on:
  schedule:
    - cron: "0 6 * * *"   # 每天北京时间 14:00 执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加上游仓库
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/Linsars/sub-store-bot.git
          else
            git remote add upstream https://github.com/Linsars/sub-store-bot.git
          fi

          git fetch --prune origin main
          git fetch --prune upstream main

          ORIGIN_SHA="$(git rev-parse origin/main)"
          UPSTREAM_SHA="$(git rev-parse upstream/main)"

          if [ "${ORIGIN_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "✨ 已是最新，无需同步。"
            exit 0
          fi

          git checkout main

          echo "🚀 合并上游 main..."
          # --allow-unrelated-histories: 一键部署是"源码导入"，无共同 git 历史
          # --no-commit: 先暂存，方便处理 workflow 文件
          # -X theirs: 冲突时用上游版本
          git merge upstream/main --allow-unrelated-histories --no-commit -X theirs

          # GITHUB_TOKEN 不能推送 .github/workflows/，从暂存区移除
          git rm --cached -r .github/workflows/ 2>/dev/null || true
          rm -rf .github/workflows/ 2>/dev/null || true

          git commit --no-edit
          git push origin main
          echo "✅ 同步完成！"
