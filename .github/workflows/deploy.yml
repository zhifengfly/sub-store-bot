name: Deploy Worker (code only)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via CF API (code only, no vars)
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F "metadata={\"main_module\":\"worker.mjs\"};type=application/json" \
            -F "worker.mjs=@worker.mjs;type=application/javascript+module" \
            -F "proxy-utils.esm.js=@proxy-utils.esm.js;type=application/javascript+module" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/jtb-clip/content"