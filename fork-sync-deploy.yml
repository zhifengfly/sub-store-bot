# ==先在仓库 Settings → Actions → General → Workflow permissions 中，勾选 "Read and write permissions"==  
# ==再在仓库 Settings → Secrets and variables → Actions → Repository secrets 中，新建 "New repository secret"==
name: Sync Upstream & Auto Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
      timezone: 'Asia/Shanghai'

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream (preserve .github/workflows)
        run: |
          mkdir -p /tmp/workflows-backup
          cp -r .github/workflows/* /tmp/workflows-backup/ 2>/dev/null || true
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Linsars/sub-store-bot.git
          git fetch upstream main
          git merge upstream/main -X theirs --no-edit --allow-unrelated-histories || echo "Merge done"
          mkdir -p .github/workflows
          cp -r /tmp/workflows-backup/* .github/workflows/ 2>/dev/null || true
          if ! git diff --quiet; then
            git add .
            git commit -m "Restore local workflows after upstream sync" --no-verify
          else
            echo "No changes to commit, skipping commit."
          fi
          git push origin main --force-with-lease || git push origin main --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Set Cloudflare Secrets (safe)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            echo "${{ secrets.BOT_TOKEN }}" | wrangler secret put BOT_TOKEN
          fi
          if [ -n "${{ secrets.WEBHOOK_SECRET }}" ]; then
            echo "${{ secrets.WEBHOOK_SECRET }}" | wrangler secret put WEBHOOK_SECRET
          fi

      - name: Deploy Worker (vars hidden)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set +x
          wrangler deploy \
            --var CLIP_URL:"${{ secrets.CLIP_URL }}" \
            --var ALLOWED_USERS:"${{ secrets.ALLOWED_USERS }}"
          set -x
