name: Fork Sync
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Sync from upstream
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加上游
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/Linsars/sub-store-bot.git
          git remote set-url upstream https://github.com/Linsars/sub-store-bot.git
          git fetch --prune upstream main

          # 备份本地文件（不随上游覆盖）
          mkdir -p /tmp/wfbak
          cp .github/workflows/fork-sync.yml /tmp/wfbak/ 2>/dev/null || true
          [ -f wrangler.toml ] && cp wrangler.toml /tmp/wfbak/ 2>/dev/null || true

          # 重置到上游
          git checkout main
          git reset --hard upstream/main

          # 恢复本地文件
          mkdir -p .github/workflows
          cp /tmp/wfbak/fork-sync.yml .github/workflows/ 2>/dev/null || true
          [ -f /tmp/wfbak/wrangler.toml ] && cp /tmp/wfbak/wrangler.toml . 2>/dev/null || true
          rm -rf /tmp/wfbak

          # API 强制更新 ref（绕过 force push 限制）
          COMMIT_SHA=$(git rev-parse HEAD)
          API_RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.SYNC_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/main" \
            -d "{\"sha\": \"${COMMIT_SHA}\", \"force\": true}")
          HTTP_CODE=$(echo "$API_RESP" | tail -1)
          echo "Synced to ${COMMIT_SHA:0:7} (HTTP $HTTP_CODE)"
